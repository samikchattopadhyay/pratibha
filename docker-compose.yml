services:
  postgres:
    image: postgres:15-alpine
    container_name: pratibha_postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pratibha
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: pratibhaparishad
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
