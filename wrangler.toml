name = "pratibha-parishad"
type = "service"
main = ".open-next/worker.js"

# Compatibility settings - required for Node.js APIs
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build && npx opennextjs-cloudflare build"
cwd = "."

[build.upload]
format = "service-worker"
main = "./.open-next/worker.js"

# Environment-specific configuration
[env.production]
vars = { ENVIRONMENT = "production" }

[env.preview]
vars = { ENVIRONMENT = "preview" }

# Secrets (set via wrangler secret put or Cloudflare UI)
# These will be injected at runtime and NOT visible in code
# DATABASE_URL
# NEXTAUTH_SECRET
# BREVO_API_KEY
# RAZORPAY_KEY_ID
# RAZORPAY_KEY_SECRET
# CRON_SECRET
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY
# FACEBOOK_APP_ID
# FACEBOOK_APP_SECRET
# TELEGRAM_BOT_TOKEN
