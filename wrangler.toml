name = "pratibha-parishad"
account_id = "f4f281db9ef7b38bf04d880e82ced7a7"
main = ".open-next/worker.js"

# Compatibility settings - required for Node.js APIs
compatibility_date = "2024-10-15"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm ci --prefer-offline --no-audit && npm run build && npx opennextjs-cloudflare build"
cwd = "."

[build.upload]
format = "service-worker"

[build.upload.rules]
type = "CompiledContentType"
globs = ["**/*.wasm"]
fallthrough = true

# Environment-specific configuration
[env.production]
vars = { ENVIRONMENT = "production", NEXTAUTH_URL = "https://pratibha-parishad.workers.dev" }
# Update NEXTAUTH_URL to your custom domain if configured in Cloudflare

[env.preview]
vars = { ENVIRONMENT = "preview", NEXTAUTH_URL = "https://preview.pratibha-parishad.workers.dev" }

# Secrets (set via wrangler secret put or Cloudflare UI)
# Environment-level secrets (set in GitHub Actions as protected environment):
# - DATABASE_URL
# - NEXTAUTH_SECRET
#
# Repository-level secrets:
# - BREVO_API_KEY
# - RAZORPAY_KEY_ID (optional)
# - RAZORPAY_KEY_SECRET (optional)
# - CRON_SECRET
# - R2_ACCESS_KEY_ID
# - R2_SECRET_ACCESS_KEY
# - FACEBOOK_APP_ID
# - FACEBOOK_APP_SECRET
# - TELEGRAM_BOT_TOKEN (optional)
