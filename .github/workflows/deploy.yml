name: Deploy Infrastructure & App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    shell: powershell

env:
  GIT_TERMINAL_PROMPT: 0
  GCM_INTERACTIVE: never
  MSYS_NO_PATHCONV: 1
  TAR: C:\Windows\System32\tar.exe

jobs:
  # ── 1. Quality gate ─────────────────────────────────────────────────
  ci:
    name: CI Check
    runs-on: [self-hosted, Windows]
    steps:
      - name: Prefer Windows system tar
        shell: powershell
        run: echo "C:\Windows\System32" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - run: npm ci --prefer-offline --no-audit

      - name: Lint
        if: github.event_name == 'pull_request'
        run: npm run lint

      - name: Typecheck
        if: github.event_name == 'pull_request'
        run: |
          if (Test-Path "tsconfig.json") {
            npx tsc --noEmit
          } else {
            Write-Host "⚠️ Skipping typecheck: No tsconfig.json found."
          }

  # ── 2. Build App ────────────────────────────────────────────────────
  build:
    name: Build App
    runs-on: [self-hosted, Windows]
    steps:
      - name: Prefer Windows system tar
        shell: powershell
        run: echo "C:\Windows\System32" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - run: npm ci --prefer-offline --no-audit

      - name: Build Next.js and OpenNext
        run: |
          npm run build
          npm run build:cf
        env:
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET:          ${{ secrets.NEXTAUTH_SECRET }}
          BREVO_API_KEY:            ${{ secrets.BREVO_API_KEY }}
          RAZORPAY_KEY_ID:          ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET:      ${{ secrets.RAZORPAY_KEY_SECRET }}
          CRON_SECRET:              ${{ secrets.CRON_SECRET }}
          R2_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
          FACEBOOK_APP_ID:          ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET:      ${{ secrets.FACEBOOK_APP_SECRET }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          NODE_ENV:                 production

      - name: Zip Build Artifact
        shell: powershell
        run: Compress-Archive -Path .open-next\* -DestinationPath next-build.zip -Force

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: next-build
          path: next-build.zip
          retention-days: 1

  # ── 3. Deploy App ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    runs-on: [self-hosted, Windows]
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
    steps:
      - name: Prefer Windows system tar
        shell: powershell
        run: echo "C:\Windows\System32" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download Build Artifact
        uses: actions/download-artifact@v7
        with:
          name: next-build
          path: .

      - name: Unzip Build Artifact
        shell: powershell
        run: |
          if (Test-Path "next-build.zip") {
            Expand-Archive -Path next-build.zip -DestinationPath .open-next -Force
          }

      - name: Create Cloudflare Pages Project
        if: github.ref == 'refs/heads/main'
        run: |
          try {
            npx wrangler pages project create pratibha-parishad --production-branch main
            Write-Host "✅ Project created successfully"
          } catch {
            Write-Host "⚠️ Project creation failed (may already exist)"
            Write-Host "Error: $_"
          }
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Push Secrets to Cloudflare Workers
        if: github.ref == 'refs/heads/main'
        run: |
          $secrets = @{
            "DATABASE_URL"             = $env:DATABASE_URL
            "NEXTAUTH_SECRET"          = $env:NEXTAUTH_SECRET
            "BREVO_API_KEY"            = $env:BREVO_API_KEY
            "RAZORPAY_KEY_ID"          = $env:RAZORPAY_KEY_ID
            "RAZORPAY_KEY_SECRET"      = $env:RAZORPAY_KEY_SECRET
            "CRON_SECRET"              = $env:CRON_SECRET
            "R2_ACCESS_KEY_ID"         = $env:R2_ACCESS_KEY_ID
            "R2_SECRET_ACCESS_KEY"     = $env:R2_SECRET_ACCESS_KEY
            "FACEBOOK_APP_ID"          = $env:FACEBOOK_APP_ID
            "FACEBOOK_APP_SECRET"      = $env:FACEBOOK_APP_SECRET
            "TELEGRAM_BOT_TOKEN"       = $env:TELEGRAM_BOT_TOKEN
            "NEXTAUTH_URL"             = $env:NEXTAUTH_URL
          }
          
          # Filter out empty values
          $filtered = @{}
          foreach ($k in $secrets.Keys) {
            if (-not [string]::IsNullOrEmpty($secrets[$k])) {
              $filtered[$k] = $secrets[$k]
            }
          }
          
          $json = $filtered | ConvertTo-Json -Compress
          Set-Content -Path "secrets.json" -Value $json -NoNewline
          try {
            npx wrangler pages secret bulk secrets.json --project-name pratibha-parishad
            Write-Host "✅ Bulk Pages secrets upload successful."
          } finally {
            Remove-Item -Force "secrets.json" -ErrorAction SilentlyContinue
          }
        env:
          CLOUDFLARE_API_TOKEN:     ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:    ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET:          ${{ secrets.NEXTAUTH_SECRET }}
          BREVO_API_KEY:            ${{ secrets.BREVO_API_KEY }}
          RAZORPAY_KEY_ID:          ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET:      ${{ secrets.RAZORPAY_KEY_SECRET }}
          CRON_SECRET:              ${{ secrets.CRON_SECRET }}
          R2_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
          FACEBOOK_APP_ID:          ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET:      ${{ secrets.FACEBOOK_APP_SECRET }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          NEXTAUTH_URL:             "https://pratibha-parishad.pages.dev"

      - name: Deploy to Cloudflare Pages
        run: |
          Remove-Item -Force wrangler.toml -ErrorAction SilentlyContinue
          Remove-Item -Force wrangler.jsonc -ErrorAction SilentlyContinue
          npx wrangler pages deploy .open-next --project-name pratibha-parishad --branch ${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN:     ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:    ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
